server:
  port: 8091

spring:
  application:
    name: pvms-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/pvms?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: "123456"

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: cn.techstar.pvms.backend
  configuration:
    map-underscore-to-camel-case: true
    arg-name-based-constructor-auto-mapping: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    cn.techstar.pvms.backend: DEBUG
