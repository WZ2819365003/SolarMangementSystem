server:
  port: 8091

spring:
  application:
    name: pvms-backend
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:pvms;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
