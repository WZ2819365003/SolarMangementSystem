version: '3.8'

services:
  pvms-mysql:
    image: arm64v8/mysql:8.0
    container_name: pvms-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pvms
      MYSQL_USER: pvms
      MYSQL_PASSWORD: pvms
    ports:
      - "3307:3306"
    volumes:
      - ./mysql-data:/var/lib/mysql
      - ../sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  pvms-backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: pvms-backend
    depends_on:
      - pvms-mysql
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://pvms-mysql:3306/pvms?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: pvms
      SPRING_DATASOURCE_PASSWORD: pvms
    restart: always

  pvms-frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: pvms-frontend
    depends_on:
      - pvms-backend
    ports:
      - "80:80"
    restart: always